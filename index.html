<!DOCTYPE html>
<html>
<head>
  <title>Brody Clicking Money Simulator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 15px;
      font-size: 40px;
    }

    #score {
      font-size: 28px;
      margin: 10px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      margin: 5px;
      font-size: 16px;
    }

    #clickButton {
      font-size: 26px;
      padding: 20px 45px;
      background: gold;
      color: black;
      border-radius: 20px;
      box-shadow: 0 8px orange;
    }

    #clickButton:active {
      transform: translateY(5px);
    }

    .panel {
      margin-top: 20px;
    }

    #wheel {
      margin: 20px auto;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 6px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: conic-gradient(red, yellow, lime, cyan, magenta, red);
      transition: transform 2s cubic-bezier(0.2, 0.9, 0.3, 1);
    }

    #result {
      margin-top: 15px;
      font-size: 20px;
      min-height: 25px;
    }

    .particle {
      position: absolute;
      font-size: 18px;
      font-weight: bold;
      pointer-events: none;
    }

    #blackjackBox {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid white;
      display: inline-block;
      border-radius: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>🎰 Brody Casino Simulator 🎰</h1>

<div id="score">Clicks: 0</div>

<button id="clickButton">CLICK</button>

<div class="panel">

  <h2>🎡 Spin Wheel</h2>
  <div id="wheel">?</div>
  <button onclick="spinWheel()">SPIN (10 clicks)</button>

  <h2>🪙 Coin Flip</h2>
  <button onclick="coinFlip()">FLIP (5 clicks)</button>

  <h2>🃏 Blackjack</h2>

  <div id="blackjackBox">
    <div id="bjText">Click Start</div>
    <button onclick="startBJ()">Start</button>
    <button onclick="hitBJ()">Hit</button>
    <button onclick="standBJ()">Stand</button>
  </div>

  <div id="result"></div>

</div>

<script>

let clicks = 0;
let multiplier = 1;

let bjPlayer = 0;
let bjDealer = 0;
let bjActive = false;

const score = document.getElementById("score");
const result = document.getElementById("result");
const wheel = document.getElementById("wheel");

function update() {
  score.innerText = "Clicks: " + clicks;
}

function particles(x,y,text) {
  for(let i=0;i<6;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.innerText=text;
    document.body.appendChild(p);

    let dx=(Math.random()-0.5)*8;
    let dy=-Math.random()*6;
    let px=x,py=y;
    let o=1;

    const t=setInterval(()=>{
      px+=dx;
      py+=dy;
      dy+=0.25;
      o-=0.03;

      p.style.left=px+"px";
      p.style.top=py+"px";
      p.style.opacity=o;

      if(o<=0){clearInterval(t);p.remove();}
    },16);
  }
}

// CLICK
document.getElementById("clickButton").onclick = (e) => {
  clicks += multiplier;
  update();
  particles(e.clientX,e.clientY,"+"+multiplier);
};

// SPIN WHEEL (ANIMATED)
function spinWheel(){
  if(clicks < 10){
    result.innerText="Not enough clicks!";
    return;
  }

  clicks -= 10;

  const rewards=[0,5,10,20,50,100];

  let spin = Math.floor(Math.random()*360 + 720);

  wheel.style.transform = `rotate(${spin}deg)`;

  setTimeout(()=>{

    let reward = rewards[Math.floor(Math.random()*rewards.length)];
    clicks += reward;

    result.innerText = "WHEEL WIN: +" + reward;

    update();

  },2000);
}

// COIN FLIP ANIMATION
function coinFlip(){
  if(clicks < 5){
    result.innerText="Not enough clicks!";
    return;
  }

  clicks -= 5;

  let coin = document.createElement("div");
  coin.innerText="🪙";
  coin.style.position="absolute";
  coin.style.fontSize="50px";
  coin.style.left="50%";
  coin.style.top="50%";
  document.body.appendChild(coin);

  let flips = 0;

  let anim = setInterval(()=>{
    coin.style.transform = `rotateY(${flips}deg)`;
    flips += 30;
  },50);

  setTimeout(()=>{
    clearInterval(anim);

    let win = Math.random() < 0.5;

    if(win){
      clicks += 15;
      result.innerText="COIN: WIN +15!";
    } else {
      result.innerText="COIN: LOST";
    }

    coin.remove();
    update();

  },1200);
}

// BLACKJACK SYSTEM
function startBJ(){
  if(clicks < 20){
    result.innerText="Not enough clicks!";
    return;
  }

  clicks -= 20;

  bjPlayer = randomCard() + randomCard();
  bjDealer = randomCard();

  bjActive = true;

  document.getElementById("bjText").innerText =
    "Player: " + bjPlayer + " | Dealer: " + bjDealer;
}

function hitBJ(){
  if(!bjActive) return;

  bjPlayer += randomCard();

  document.getElementById("bjText").innerText =
    "Player: " + bjPlayer + " | Dealer: " + bjDealer;

  if(bjPlayer > 21){
    result.innerText="BUST!";
    bjActive=false;
  }
}

function standBJ(){
  if(!bjActive) return;

  while(bjDealer < 17){
    bjDealer += randomCard();
  }

  let msg="Player: "+bjPlayer+" Dealer: "+bjDealer+" ";

  if(bjPlayer > 21 || (bjDealer <= 21 && bjDealer > bjPlayer)){
    msg+="YOU LOST";
  } else {
    clicks += 50;
    msg+="YOU WIN +50!";
  }

  result.innerText=msg;
  bjActive=false;
  update();
}

function randomCard(){
  return Math.floor(Math.random()*10)+1;
}

update();

</script>

</body>
</html>
