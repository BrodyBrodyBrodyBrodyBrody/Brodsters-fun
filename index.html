<!DOCTYPE html>
<html>
<head>
  <title>Ball Toss Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 18px;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<div id="ui">
  <div>Combo: <span id="combo">0</span></div>
  <div>Drag and release to throw!</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: 0,
  vy: 0,
  r: 18
};

let gravity = 0.5;
let friction = 0.99;
let combo = 0;

let dragging = false;
let startX, startY;

function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx = 0;
  ball.vy = 0;
}

canvas.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX;
  startY = e.clientY;
});

canvas.addEventListener("mouseup", (e) => {
  if (!dragging) return;
  dragging = false;

  let dx = e.clientX - startX;
  let dy = e.clientY - startY;

  ball.vx = dx * 0.2;
  ball.vy = dy * 0.2;

  combo = 0;
  document.getElementById("combo").innerText = combo;
});

function update() {
  if (!dragging) {
    ball.vy += gravity;
    ball.x += ball.vx;
    ball.y += ball.vy;

    ball.vx *= friction;
    ball.vy *= friction;

    // floor
    if (ball.y + ball.r > canvas.height) {
      ball.y = canvas.height - ball.r;
      ball.vy *= -0.8;
      combo++;
      document.getElementById("combo").innerText = combo;
    }

    // ceiling
    if (ball.y - ball.r < 0) {
      ball.y = ball.r;
      ball.vy *= -0.8;
    }

    // walls
    if (ball.x + ball.r > canvas.width) {
      ball.x = canvas.width - ball.r;
      ball.vx *= -0.8;
    }

    if (ball.x - ball.r < 0) {
      ball.x = ball.r;
      ball.vx *= -0.8;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "#38bdf8";
  ctx.fill();
  ctx.closePath();

  // shadow glow
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r + 10, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(56,189,248,0.2)";
  ctx.stroke();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
