<!DOCTYPE html>
<html>
<head>
<title>BrodyBrodyBrodySimulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color: white;
}

#loading {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 9999;
  flex-direction: column;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.tab { display: none; }
.active { display: block; }

.casinoArea { display: none; }

#wheel {
  width: 150px;
  height: 150px;
  margin: auto;
  border-radius: 50%;
  background: conic-gradient(red,yellow,green,cyan,magenta,red);
  transition: transform 1.8s ease;
}
</style>
</head>

<body>

<div id="loading">
  Loading Casino...
  <div id="loadText">Starting...</div>
</div>

<h1>🎰 AAA Casino Clicker</h1>

<div id="score">Clicks: 0</div>

<button onclick="clicker()">CLICK</button>

<hr>

<button onclick="openTab('casino')">Casino</button>
<button onclick="openTab('pets')">Pets</button>

<div id="casino" class="tab active">

  <h2>Casino Room</h2>

  <button onclick="openGame('wheel')">Wheel</button>
  <button onclick="openGame('coin')">Coin</button>
  <button onclick="openGame('blackjack')">Blackjack</button>

  <div id="wheel" class="casinoArea">
    <h3>Wheel</h3>
    <div id="wheelUI"></div>
    <button onclick="spinWheel()">Spin (10)</button>
    <div id="wheelLog"></div>
  </div>

  <div id="coin" class="casinoArea">
    <h3>Coin</h3>
    <button onclick="coinFlip()">Flip (5)</button>
    <div id="coinLog"></div>
  </div>

  <div id="blackjack" class="casinoArea">
    <h3>Blackjack</h3>

    <div>Player: <span id="player"></span></div>
    <div>Dealer: <span id="dealer"></span></div>

    <button onclick="bjStart()">Start</button>
    <button onclick="bjHit()">Hit</button>
    <button onclick="bjStand()">Stand</button>

    <div id="bjLog"></div>
  </div>

</div>

<div id="pets" class="tab">
  <h2>Pets</h2>
  <p>🐶 Dog (+1/sec)</p>
  <button onclick="buyPet(50,1)">Buy 50 clicks</button>

  <p>🐱 Cat (+3/sec)</p>
  <button onclick="buyPet(150,3)">Buy 150 clicks</button>
</div>

<script>

let clicks = 0;
let pets = 0;

let bjP = 0;
let bjD = 0;
let bjOn = false;

const el = {
  score: document.getElementById("score"),
  loading: document.getElementById("loading"),
  loadText: document.getElementById("loadText"),
  player: document.getElementById("player"),
  dealer: document.getElementById("dealer"),
  wheel: document.getElementById("wheelUI"),
  wheelLog: document.getElementById("wheelLog"),
  coinLog: document.getElementById("coinLog"),
  bjLog: document.getElementById("bjLog")
};

// SAFE SAVE
function save(){
  localStorage.setItem("c",clicks);
  localStorage.setItem("p",pets);
}

function load(){
  clicks = Number(localStorage.getItem("c")) || 0;
  pets = Number(localStorage.getItem("p")) || 0;
}

// UPDATE SAFE
function update(){
  el.score.innerText = "Clicks: " + clicks;
  save();
}

// CLICK
function clicker(){
  clicks++;
  update();
}

// TABS SAFE
function openTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openGame(id){
  document.querySelectorAll(".casinoArea").forEach(g=>g.style.display="none");
  const e = document.getElementById(id);
  if(e) e.style.display="block";
}

// WHEEL
function spinWheel(){
  if(clicks < 10) return;

  clicks -= 10;

  let rot = Math.random()*720 + 360;
  el.wheel.style.transform = "rotate("+rot+"deg)";

  setTimeout(()=>{
    let win = [0,5,10,20,50][Math.floor(Math.random()*5)];
    clicks += win;

    el.wheelLog.innerHTML = "+"+win+"<br>"+el.wheelLog.innerHTML;

    update();
  },1500);
}

// COIN
function coinFlip(){
  if(clicks < 5) return;

  clicks -= 5;

  let win = Math.random()<0.5;

  if(win){
    clicks += 15;
    el.coinLog.innerHTML = "WIN +15<br>"+el.coinLog.innerHTML;
  } else {
    el.coinLog.innerHTML = "LOSS<br>"+el.coinLog.innerHTML;
  }

  update();
}

// BLACKJACK FIXED
function bjStart(){
  if(clicks < 20) return;

  clicks -= 20;

  bjP = r()+r();
  bjD = r();

  bjOn = true;

  render();
  check();
  update();
}

function bjHit(){
  if(!bjOn) return;

  bjP += r();
  render();
  check();
}

function bjStand(){
  if(!bjOn) return;

  while(bjD < 17) bjD += r();

  finish();
}

function check(){
  if(bjP > 21){
    log("BUST LOSE");
    bjOn = false;
  }
}

function finish(){
  let msg;

  if(bjP <= 21 && (bjP > bjD || bjD > 21)){
    clicks += 50;
    msg = "WIN +50";
  } else {
    msg = "LOSE";
  }

  log(msg);
  bjOn = false;
  update();
}

function render(){
  el.player.innerText = bjP;
  el.dealer.innerText = bjD;
}

function log(t){
  el.bjLog.innerHTML = t + "<br>" + el.bjLog.innerHTML;
}

function r(){
  return Math.floor(Math.random()*10)+1;
}

// PETS
function buyPet(cost, gain){
  if(clicks >= cost){
    clicks -= cost;
    pets += gain;
    update();
  }
}

// AUTO PETS
setInterval(()=>{
  clicks += pets;
  update();
},1000);

// INIT SAFE
window.onload = () => {
  load();
  update();

  el.loading.style.display = "none";
};

</script>

</body>
</html>
